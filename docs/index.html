field"><label>Delta vs faixa máxima</label><input disabled value="${fmt(salaryDelta(p,c))}"></div><div class="span9 field"><label>Direcionadores Suzano</label><div>${suzanoDrivers.map(d=>`<label class="pill" style="margin:3px"><input ${editDisabled(cEdit)} type="checkbox" ${c.drivers?.[d]?"checked":""} onchange="p.candidates[${activeCand}].drivers=p.candidates[${activeCand}].drivers||{};p.candidates[${activeCand}].drivers['${d}']=this.checked;saveLocal();render()">${d}</label>`).join("")}</div></div></div><div class="tablewrap"><table class="tbl" style="min-width:860px"><tr><th>Competência</th><th>Esperado pela vaga</th><th>Avaliação candidato</th></tr>${comps.map((comp,i)=>`<tr><td>${i+1}. ${comp}</td><td>${expected(p.role)[i]}</td><td><input ${editDisabled(cEdit)} class="score" type="number" min="0" max="5" value="${c.scores[i]}" oninput="p.candidates[${activeCand}].scores[${i}]=Number(this.value);saveLocal()"></td></tr>`).join("")}</table></div><div class="field"><label>Parecer / fit cultural / comunicação / autonomia / capacidade analítica</label><textarea ${editDisabled(cEdit)} oninput="p.candidates[${activeCand}].notes=this.value;saveLocal()">${c.notes||""}</textarea></div><div class="actions">${cEdit?`<button ${disabled()} onclick="saveCand(${activeCand})">Salvar candidato</button><button class="danger" ${disabled()} onclick="p.candidates.splice(${activeCand},1);activeCand=-1;saveLocal();saveToSupabase('Candidato excluído.');render()">Excluir candidato</button>`:`<button ${disabled()} onclick="p.candidates[${activeCand}].editing=true;render()">Editar candidato</button>`}<span class="mini">Últ. mod.: ${c.last||"-"} | Aderência: ${ader(c,p.role)}% | Direcionadores: ${driverScore(c)}/3</span></div>${radar(c,p.role)}</section>`:"";return`<div class="grid"><div class="metric"><span>Processos abertos</span><b>${open}</b></div><div class="metric"><span>Candidatos neste processo</span><b>${p.candidates.length}</b></div><div class="metric"><span>Prazo vencido</span><b>${late}</b></div><div class="metric"><span>Melhor indicado</span><b>${best?best.name:"-"}</b></div><section class="panel span4"><h2>Processo de Admissão</h2><div class="process-list">${processes.map((pr,i)=>`<div class="process-card ${i===activeProc?"active":""}" onclick="activeProc=${i};activeCand=-1;render()"><b>${pr.name}</b><br><span class="sub">${pr.role} | GS ${pr.gs||"-"} | ${pr.stage} | ${pr.candidates.length} candidato(s)</span></div>`).join("")}</div><button ${disabled()} onclick="newProcess()">Cadastrar processo</button></section><section class="panel span8"><h2>Ficha do processo</h2><div class="grid"><div class="span6 field"><label>Nome do processo</label><input ${editDisabled(procEdit)} value="${p.name}" oninput="p.name=this.value;saveLocal()"></div><div class="span3 field"><label>Vaga/cargo alvo</label><select ${editDisabled(procEdit)} onchange="p.role=this.value;saveLocal();render()">${rolesAll.map(r=>`<option ${p.role===r?"selected":""}>${r}</option>`).join("")}</select></div><div class="span3 field"><label>GS Suzano</label><input ${editDisabled(procEdit)} placeholder="Ex.: GS 16" value="${p.gs||""}" oninput="p.gs=this.value;saveLocal()"></div><div class="span3 field"><label>Faixa salarial mín. (R$)</label><input ${editDisabled(procEdit)} inputmode="numeric" value="${p.salaryMin||p.salary||""}" oninput="p.salaryMin=this.value;saveLocal()"></div><div class="span3 field"><label>Faixa salarial máx. (R$)</label><input ${editDisabled(procEdit)} inputmode="numeric" value="${p.salaryMax||""}" oninput="p.salaryMax=this.value;saveLocal()"></div><div class="span3 field"><label>Prazo alvo de admissão</label><input ${editDisabled(procEdit)} type="date" value="${p.target}" oninput="p.target=this.value;saveLocal()"></div><div class="span3 field"><label>Etapa</label><select ${editDisabled(procEdit)} onchange="p.stage=this.value;saveLocal();render()">${["Mapeamento","Triagem","Entrevistas","Finalistas","Oferta","Admissão","Encerrado"].map(s=>`<option ${p.stage===s?"selected":""}>${s}</option>`).join("")}</select></div><div class="span3 field"><label>Prioridade</label><select ${editDisabled(procEdit)} onchange="p.priority=this.value;saveLocal()">${["Baixa","Média","Alta","Crítica"].map(s=>`<option ${p.priority===s?"selected":""}>${s}</option>`).join("")}</select></div><div class="span9 field"><label>Decisão final / observações do processo</label><textarea ${editDisabled(procEdit)} oninput="p.decision=this.value;saveLocal()">${p.decision||""}</textarea></div></div><div class="actions">${procEdit?`<button ${disabled()} onclick="saveProcess()">Salvar processo</button>`:`<button ${disabled()} onclick="p.editing=true;render()">Editar processo</button>`}<button class="danger" ${disabled()} onclick="deleteProcess()">Excluir processo</button><button ${disabled()} class="alt" onclick="addCand()">Adicionar candidato</button><span class="mini">Última modificação: ${p.last||"-"}</span></div>${candSummary}</section>${fichaCand}<section class="panel span12"><h2>Ranking e decisão</h2>${best?`<div class="insight good">Indicação da ferramenta: ${best.name}, com ${best.ader}% de aderência técnica, ${driverScore(best)}/3 direcionadores e delta salarial de ${fmt(salaryDelta(p,best))}.</div>`:""}${rank.map((c,i)=>`<div class="insight"><b>${i+1}. ${c.name}</b> - aderência ${c.ader}% - direcionadores ${driverScore(c)}/3 - delta ${fmt(salaryDelta(p,c))} - status ${c.status}</div>`).join("")||"<span class='sub'>Cadastre candidatos para gerar ranking.</span>"}</section></div>`}
function dashboard(){let d=data();return`<div class="grid">${metrics(d)}<section class="panel span12"><h2>Resumo executivo</h2><div class="structure">${d.map(p=>card(p,Math.max(...d.map(x=>x.spend),1))).join("")}</div></section></div>`}
function login(){return`<div class="login-wrap"><div class="login"><h1>Serviços Corporativos Board Gestão</h1><p class="sub">Login conectado ao Supabase via função pública segura, mantendo os dados no schema team_os.</p><input id="loginEmail" placeholder="email@suzano.com.br" value="diaswagnerjr@gmail.com"><button onclick="doLogin()">Entrar</button><p class="sub">Editor inicial: diaswagnerjr@gmail.com</p></div></div>`}
function render(){if(!user){document.getElementById("app").innerHTML=login();return}let nav=[["estrutura","Estrutura"],["raiox","Raio X do Time"],["candidatos","Processo de Admissão"]].map(([id,l])=>`<button class="${tab===id?"active":""}" onclick="tab='${id}';render()">${l}</button>`).join("");let body={dashboard:dashboard(),estrutura:estrutura(),raiox:raioX(),candidatos:candidatos()}[tab];document.getElementById("app").innerHTML=`<div class="shell"><aside class="side"><div class="brand">Board Gestão<span>Serviços Corporativos</span></div>${nav}<div class="hint"><span class="pill">${user.role==="editor"?"Editor":"Visualizador"}</span><br>${user.email}<br>Back-end: Supabase team_os<br><button class="alt" onclick="localStorage.removeItem('teamOSUser');user=null;render()">Sair</button></div></aside><main class="main"><header><div><h1>Serviços Corporativos Board Gestão</h1><div class="sub">Align Structure | Plano de 100 dias</div></div><div class="actions"><button class="alt" onclick="window.print()">Exportar/Imprimir</button><button class="alt" onclick="localStorage.removeItem('teamOSUser');user=null;render()">Sair</button></div></header>${notice?`<div class="notice ${notice.err?"err":""}">${notice.msg}</div>`:""}${body}</main></div>`}
render();
</script></body></html>
